name: ci

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Neovim
        run: |
          sudo add-apt-repository ppa:neovim-ppa/unstable -y
          sudo apt-get update
          sudo apt-get install -y neovim
      - name: Smoke test sqlui
        run: |
          nvim --headless --cmd 'set runtimepath+=.' '+runtime plugin/sqlui.lua' '+lua require("sqlui").setup({})' +qa
